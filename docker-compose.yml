services:
  postgres:
    image: postgres:16-alpine
    container_name: assetflow-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: assetflow
      POSTGRES_PASSWORD: assetflow
      POSTGRES_DB: assetflow
    ports:
      - "5432:5432"
    volumes:
      - assetflow_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U assetflow -d assetflow"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: assetflow-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://assetflow:assetflow@postgres:5432/assetflow?schema=public
      JWT_SECRET: super-secret-assetflow-dev-key-change-me
      PORT: "4000"
      WEB_ORIGIN: http://localhost:5173
      NODE_ENV: production
    ports:
      - "4000:4000"
    volumes:
      - assetflow_uploads:/app/uploads

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
      args:
        VITE_API_URL: http://localhost:4000
    container_name: assetflow-web
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "5173:80"

volumes:
  assetflow_pgdata:
  assetflow_uploads:
